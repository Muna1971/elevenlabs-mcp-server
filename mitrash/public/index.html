<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="مطراش — تطبيق مراسلات إماراتي محلي بهوية أصيلة">
  <title>مطراش — مرحبا الساع</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="welcome-page">
  <div class="sadu-pattern" aria-hidden="true"></div>

  <main class="welcome-container">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 120 120" width="110" height="110">
        <defs>
          <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E8C677"/>
            <stop offset="100%" stop-color="#8B7344"/>
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="56" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
        <circle cx="60" cy="60" r="48" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.5"/>
        <text x="60" y="82" text-anchor="middle" font-family="Amiri, serif" font-size="68" font-weight="700" fill="url(#goldGradient)">م</text>
      </svg>
    </div>

    <h1 class="app-name">مطراش</h1>
    <p class="tagline">مرحبا الساع</p>
    <p class="subtitle">تطبيق مراسلات إماراتي محلي<br>تواصل بهوية، تحدّث بثقة</p>

    <form id="login-form" class="login-form" autocomplete="off">
      <label for="username">اسم المستخدم</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="اكتب اسمك هنا..."
        maxlength="32"
        required
        autofocus
      >
      <div id="error-msg" class="error-msg" role="alert"></div>
      <button type="submit">
        <span>ادخل التطبيق</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
      </button>
    </form>

    <div class="welcome-features">
      <div class="feature">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>خصوصية عالية</span>
      </div>
      <div class="feature">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>مراسلة فورية</span>
      </div>
      <div class="feature">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span>هوية إماراتية</span>
      </div>
    </div>

    <footer class="welcome-footer">
      <p>صُنع بفخر في دولة الإمارات العربية المتحدة</p>
      <p class="version">الإصدار التجريبي 0.1.0</p>
    </footer>
  </main>

  <script src="/js/welcome.js"></script>
</body>
</html>
